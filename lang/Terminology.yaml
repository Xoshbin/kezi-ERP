  consistency: "Always use the exact terms listed in this glossary"
  context: "Consider the context when choosing between similar terms"
  updates: "Any changes to terminology must be reflected in this glossary first"
  translation_priority: "English terms should be used as primary, with Kurdish (Sorani) and Arabic as secondary references"
  new_terms: "When adding new accounting terms, follow the pattern established here"

# Additional Notes
notes:
  kurdish_terms: "Kurdish terms prioritize clarity and natural Kurdish language flow"
  arabic_terms: "Arabic terms follow standard accounting terminology used in the Middle East"
  english_terms: "English terms follow international accounting standards (IFRS/GAAP)"
  regional_variations: "Some terms may have regional variations; these represent the preferred standard for this application"
