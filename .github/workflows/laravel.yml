name: CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, dom, fileinfo, curl, gd, bcmath, zip, pdo_sqlite
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies (with dev)
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-interaction

      - name: Generate key
        run: php artisan key:generate

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Guard against committing local path packages in composer.lock
        run: |
          if grep -q '"type": "path"' composer.lock; then
            echo "composer.lock contains path packages. Do not commit a lockfile generated with composer.local.json. Run 'composer update' without composer.local.json before committing.";
            exit 1;
          fi

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: vendor/bin/pest --ci

  deploy:
    name: Trigger Ploi deploy
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Call Ploi deploy webhook
        env:
          PLOI_WEBHOOK: ${{ secrets.PLOI_DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$PLOI_WEBHOOK" ]; then
            echo "PLOI_DEPLOY_WEBHOOK_URL secret is missing" >&2
            exit 1
          fi
          echo "Triggering Ploi deployment..."
          # Try up to 3 times in case of transient network issues
          for i in 1 2 3; do
            if curl -fsS -X POST "$PLOI_WEBHOOK"; then
              echo "Ploi deployment webhook triggered"
              exit 0
            fi
            echo "Retrying in 5s..."
            sleep 5
          done
          echo "Failed to trigger Ploi webhook" >&2
          exit 1
